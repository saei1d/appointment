{% extends 'base.html' %}{% block title %}Providers{% endblock %}{% block content %}
<h1 class="text-2xl font-bold mb-4">رزرو آنلاین زیبایی</h1>
<div class="grid md:grid-cols-3 gap-4">{% for provider in providers %}<a class="bg-white rounded-2xl p-4 shadow" href="{% url 'provider_public_page' provider.slug %}"><div class="h-28 rounded-xl bg-pink-100 mb-3"></div><h2 class="font-bold">{{ provider.user.fullname }}</h2><p>{{ provider.bio|truncatechars:90 }}</p></a>{% empty %}<p>هنوز ارائه‌دهنده‌ای ثبت نشده است.</p>{% endfor %}</div>
{% endblock %}
