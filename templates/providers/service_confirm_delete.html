{% extends 'base.html' %}

{% block title %}حذف خدمت{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-6">حذف خدمت</h1>
  
  <div class="bg-white rounded-xl shadow p-6">
    <p class="mb-4">آیا مطمئن هستید که می‌خواهید خدمت <strong>{{ service.name }}</strong> را حذف کنید؟</p>
    
    <p class="text-gray-500 text-sm mb-6">این عمل قابل بازگشت نیست.</p>
    
    <form method="post">
      {% csrf_token %}
      <div class="flex gap-3">
        <button type="submit" class="bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700 transition">
          بله، حذف کن
        </button>
        <a href="{% url 'service_list' %}" class="bg-gray-200 text-gray-700 px-6 py-3 rounded-lg hover:bg-gray-300 transition">
          انصراف
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
