{% extends 'base.html' %}{% block content %}
<h1 class="text-2xl font-bold mb-4">رزرو {{ service.name }}</h1>
<form method="get" class="bg-white p-4 rounded-2xl mb-4"><label>تاریخ <input class="border rounded p-2" type="date" name="date" value="{{ selected_date|date:'Y-m-d' }}"></label><button class="bg-gray-900 text-white px-4 py-2 rounded">نمایش زمان‌ها</button></form>
{% if selected_date %}<form method="post" class="bg-white p-4 rounded-2xl">{% csrf_token %}<input type="hidden" name="date" value="{{ selected_date|date:'Y-m-d' }}"><div class="grid grid-cols-3 gap-2">{% for slot in slots %}<button name="start_time" value="{{ slot|time:'H:i:s' }}" class="border rounded-xl p-3 hover:bg-pink-100">{{ slot|time:'H:i' }}</button>{% empty %}<p>زمان آزادی وجود ندارد.</p>{% endfor %}</div><textarea name="notes" class="border rounded w-full mt-4 p-2" placeholder="توضیحات"></textarea></form>{% endif %}
{% endblock %}
