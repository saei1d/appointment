{% extends 'base.html' %}
{% block title %}حذف مقاله{% endblock %}
{% block content %}
<section class="max-w-2xl mx-auto px-4 py-16">
    <div class="bg-card rounded-[28px] p-10 shadow-soft border border-line text-center">
        <h1 class="text-3xl font-black mb-5">حذف مقاله</h1>
        <p class="text-stonewarm mb-10 text-lg">آیا از حذف مقاله «{{ post.title }}» مطمئن هستید؟</p>
        <form method="post" class="flex justify-center gap-4">
            {% csrf_token %}
            <button class="bg-red-500 text-white px-8 py-4 rounded-full shadow-lg hover:shadow-xl transition transform hover:-translate-y-0.5 font-semibold" type="submit">بله، حذف کن</button>
            <a class="bg-blush text-ink px-8 py-4 rounded-full font-semibold hover:bg-clay/50 transition" href="{% url 'blog_list' %}">انصراف</a>
        </form>
    </div>
</section>
{% endblock %}
