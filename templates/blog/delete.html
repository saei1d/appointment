{% extends 'base.html' %}
{% block title %}حذف مقاله{% endblock %}
{% block content %}
<section class="max-w-2xl mx-auto px-4 py-12">
    <div class="bg-white rounded-3xl p-8 shadow text-center">
        <h1 class="text-2xl font-black mb-4">حذف مقاله</h1>
        <p class="text-slate-600 mb-8">آیا از حذف مقاله «{{ post.title }}» مطمئن هستید؟</p>
        <form method="post" class="flex justify-center gap-3">
            {% csrf_token %}
            <button class="bg-red-600 text-white px-6 py-3 rounded-full hover:bg-red-700 transition" type="submit">بله، حذف کن</button>
            <a class="bg-slate-100 px-6 py-3 rounded-full" href="{% url 'blog_list' %}">انصراف</a>
        </form>
    </div>
</section>
{% endblock %}
