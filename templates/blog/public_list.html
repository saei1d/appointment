{% extends 'base.html' %}{% block content %}<section class="p-4"><h1 class="brand text-4xl">بلاگ نوبتینو</h1><div class="mt-4 space-y-3">{% for post in posts %}<a class="block rounded-3xl bg-white p-4 shadow" href="{% url 'blog_detail_public' post.slug %}"><b>{{ post.title }}</b><p class="text-xs text-stone-500">{{ post.published_at|date:'Y/m/d' }}</p></a>{% empty %}<p>مطلبی نیست.</p>{% endfor %}</div></section>{% endblock %}
