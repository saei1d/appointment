{% extends 'base.html' %}{% block content %}<section class="p-4"><h1 class="brand text-4xl">نوع {{ category.name }}</h1>{% if not request.user.city %}<p class="mt-2 rounded-2xl bg-yellow-50 p-3 text-sm">شهر شما ثبت نشده؛ از ورود با OTP شهر را وارد کنید.</p>{% endif %}<form method="post" class="mt-4 space-y-3">{% csrf_token %}{% for template in templates %}<button name="template_id" value="{{ template.id }}" class="w-full rounded-3xl bg-white p-4 text-right shadow"><b>{{ template.name }}</b><p class="text-sm text-stone-500">{{ template.description|default:'ارائه‌دهنده‌های فعال شهر شما' }}</p></button>{% empty %}<p class="rounded-3xl bg-white p-5 text-stone-500 shadow">برای شهر شما موردی پیدا نشد.</p>{% endfor %}</form></section>{% endblock %}
