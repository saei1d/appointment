{% extends 'base.html' %}{% block content %}<section class="p-4"><h1 class="brand text-4xl">چه خدمتی می‌خوای؟</h1><form method="post" class="mt-4 grid grid-cols-2 gap-3">{% csrf_token %}{% for category in categories %}<button name="category_slug" value="{{ category.slug }}" class="rounded-3xl bg-white p-5 text-right shadow"><span class="text-3xl">{{ category.icon }}</span><b class="mt-3 block">{{ category.name }}</b><small class="text-stone-500">{{ category.description|truncatechars:45 }}</small></button>{% endfor %}</form></section>{% endblock %}
