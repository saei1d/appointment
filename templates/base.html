<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Beauty Booking{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-pink-50 text-gray-900">
<nav class="bg-white border-b p-4 flex gap-4 justify-between">
  <a class="font-bold text-pink-600" href="{% url 'home' %}">Beauty Booking</a>
  <div class="flex gap-3">{% if user.is_authenticated %}{% if user.is_provider_role %}<a href="{% url 'provider_dashboard' %}">داشبورد</a><a href="{% url 'service_list' %}">خدمات</a><a href="{% url 'subscription_plans' %}">اشتراک</a>{% else %}<a href="{% url 'customer_dashboard' %}">داشبورد</a>{% endif %}<form method="post" action="{% url 'logout' %}">{% csrf_token %}<button>خروج</button></form>{% else %}<a href="{% url 'otp_auth' %}">ورود / ثبت‌نام</a>{% endif %}</div>
</nav>
<main class="max-w-5xl mx-auto p-4">
{% for message in messages %}<div class="mb-3 rounded bg-white p-3 shadow">{{ message }}</div>{% endfor %}
{% block content %}{% endblock %}
</main>
</body>
</html>
