<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}نوبتینو{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    @font-face{font-family:Razan;src:url('/media/fonts/Razan.woff2') format('woff2'),url('/media/fonts/Razan.ttf') format('truetype');font-display:swap}
    @font-face{font-family:Lalezar;src:url('/media/fonts/Lalezar.woff2') format('woff2'),url('/media/fonts/Lalezar.ttf') format('truetype');font-display:swap}
    body{font-family:Razan,ui-sans-serif,system-ui;background:linear-gradient(180deg,#fff8f5,#f7f1ea)} .brand{font-family:Lalezar,Razan,sans-serif}.snap-x{scroll-snap-type:x mandatory}.snap-card{scroll-snap-align:start}
  </style>
</head>
<body class="text-[#261f1b] antialiased">
  <div class="mx-auto min-h-screen max-w-[430px] bg-[#fffaf7] shadow-2xl">
    <nav class="sticky top-0 z-40 border-b border-black/5 bg-white/85 px-4 py-3 backdrop-blur">
      <div class="flex items-center justify-between"><a class="brand text-3xl text-pink-600" href="{% url 'home' %}">نوبتینو</a><div class="flex items-center gap-2 text-xs">{% if user.is_authenticated %}<a class="rounded-full bg-stone-900 px-4 py-2 text-white" href="{% if user.is_provider_role %}{% url 'provider_dashboard' %}{% else %}{% url 'customer_dashboard' %}{% endif %}">داشبورد</a><form method="post" action="{% url 'logout' %}">{% csrf_token %}<button class="text-stone-500">خروج</button></form>{% else %}<a class="rounded-full bg-pink-500 px-4 py-2 text-white" href="{% url 'otp_auth' %}">ورود</a>{% endif %}</div></div>
    </nav>
    {% if messages %}<div class="space-y-2 p-4">{% for message in messages %}<div class="rounded-2xl border bg-white p-3 text-sm shadow">{{ message }}</div>{% endfor %}</div>{% endif %}
    <main class="pb-8">{% block content %}{% endblock %}</main>
    <footer class="mx-4 mb-4 rounded-[2rem] bg-stone-950 p-6 text-white"><b class="brand text-3xl text-pink-200">نوبتینو</b><p class="mt-2 text-sm text-white/70">رزرو سریع خدمات زیبایی در شهر شما.</p><div class="mt-5 grid grid-cols-2 gap-2 text-sm text-white/70"><a href="{% url 'onboarding_welcome' %}">شروع سریع</a><a href="{% url 'provider_register' %}">ثبت متخصص</a><a href="{% url 'customer_bookings' %}">رزروهای من</a><a href="/blog/">بلاگ</a></div></footer>
  </div>
</body>
</html>
