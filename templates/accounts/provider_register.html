{% extends 'base.html' %}{% block title %}ثبت متخصص{% endblock %}{% block content %}<section class="p-4"><div class="rounded-[2rem] bg-[#fdccc5] p-6 text-center shadow"><h1 class="brand text-4xl">ثبت صفحه متخصص</h1><p class="mt-2 text-sm text-stone-700">اطلاعات فعلی مدل Provider را کامل کن و بعد پلن را انتخاب کن.</p></div><form method="post" class="mt-4 space-y-3 rounded-[2rem] bg-white p-5 shadow">{% csrf_token %}<input name="fullname" value="{{ request.user.fullname }}" class="w-full rounded-2xl border p-3" placeholder="نام سالن یا متخصص" required><div><input name="slug" value="{{ provider.slug|default:'' }}" class="w-full rounded-2xl border p-3 ltr" placeholder="آدرس انگلیسی اختصاصی" hx-get="{% url 'check_slug' %}" hx-trigger="keyup changed delay:500ms" hx-target="#slug-result"><div id="slug-result" class="mt-1 text-xs"></div></div><input name="city" value="{{ provider.city|default:request.user.city }}" class="w-full rounded-2xl border p-3" placeholder="شهر" required><textarea name="bio" class="w-full rounded-2xl border p-3" rows="3" placeholder="معرفی کوتاه">{{ provider.bio|default:'' }}</textarea><input name="contact_phone" value="{{ provider.contact_phone|default:'' }}" class="w-full rounded-2xl border p-3" placeholder="شماره تماس"><input name="whatsapp" value="{{ provider.whatsapp|default:'' }}" class="w-full rounded-2xl border p-3" placeholder="واتساپ"><input name="instagram" value="{{ provider.instagram|default:'' }}" class="w-full rounded-2xl border p-3" placeholder="لینک اینستاگرام"><input name="telegram" value="{{ provider.telegram|default:'' }}" class="w-full rounded-2xl border p-3" placeholder="لینک تلگرام"><textarea name="address" class="w-full rounded-2xl border p-3" rows="2" placeholder="آدرس">{{ provider.address|default:'' }}</textarea><button class="w-full rounded-2xl bg-stone-950 py-4 font-black text-white">ذخیره و ادامه</button></form></section>{% endblock %}
