{% extends 'base.html' %}{% block title %}ثبت‌نام ارائه‌دهنده{% endblock %}{% block content %}<div class="max-w-3xl mx-auto px-4 py-10"><div class="bg-white rounded-3xl shadow p-6"><h1 class="text-3xl font-black mb-6">تبدیل حساب به ارائه‌دهنده</h1><form method="post" class="grid md:grid-cols-2 gap-4">{% csrf_token %}<input class="border rounded-2xl p-3" name="fullname" value="{{ request.user.fullname }}" placeholder="نام و نام خانوادگی" required><input class="border rounded-2xl p-3" name="city" placeholder="شهر فعالیت" required><div class="md:col-span-2"><input class="border rounded-2xl p-3 w-full" name="slug" placeholder="slug بیشتر از ۴ حرف" required hx-get="{% url 'check_slug' %}" hx-trigger="keyup changed delay:400ms" hx-target="#slug-status" hx-include="this"><div id="slug-status" class="text-sm mt-2 text-slate-500">آدرس اختصاصی شما به صورت زنده بررسی می‌شود.</div></div><textarea class="md:col-span-2 border rounded-2xl p-3" name="bio" placeholder="توضیح کوتاه"></textarea><input class="border rounded-2xl p-3" name="contact_phone" placeholder="شماره تماس"><input class="border rounded-2xl p-3" name="instagram" placeholder="لینک اینستاگرام"><textarea class="md:col-span-2 border rounded-2xl p-3" name="address" placeholder="آدرس"></textarea><button class="md:col-span-2 bg-pink-600 text-white rounded-2xl py-3">ثبت اولیه و مشاهده پلن‌ها</button></form></div></div>{% endblock %}
