{% extends 'base.html' %}
{% block title %}ثبت‌نام ارائه‌دهنده{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 py-10">
  <div class="bg-white rounded-3xl shadow p-6">
    <h1 class="text-3xl font-black mb-6">تبدیل حساب به ارائه‌دهنده</h1>
    <form method="post" class="grid md:grid-cols-2 gap-4">
      {% csrf_token %}
      <input class="border rounded-2xl p-3" name="fullname" value="{{ request.user.fullname }}" placeholder="نام و نام خانوادگی" required>
      
      <div>
        <label class="block mb-2 font-medium">شهر فعالیت</label>
        <select class="border rounded-2xl p-3 w-full" name="city" required>
          <option value="">انتخاب کنید</option>
          <option value="قم" {% if provider.city == 'قم' %}selected{% endif %}>قم</option>
        </select>
      </div>
      
      <div class="md:col-span-2">
        <label class="block mb-2 font-medium">آدرس اختصاصی (Slug)</label>
        <div class="flex items-center border rounded-2xl overflow-hidden" dir="ltr" style="margin-left: auto;">
          <input class="flex-1 p-3 border-0 focus:outline-none text-left" name="slug" placeholder="نام لاین زیبایی (فقط حروف انگلیسی و اعداد، حداقل ۴ حرف)" required hx-get="{% url 'check_slug' %}" hx-trigger="keyup changed delay:400ms" hx-target="#slug-status" hx-include="this" value="{{ provider.slug|default:'' }}" pattern="[a-zA-Z0-9-_]+" title="فقط حروف انگلیسی، اعداد، خط تیره و زیرخط مجاز است">
          <span class="bg-gray-100 px-4 py-3 text-gray-600 text-sm">mydomain.com/</span>
        </div>
        <div id="slug-status" class="text-sm mt-2 text-slate-500">آدرس اختصاصی شما به صورت زنده بررسی می‌شود.</div>
      </div>
      
      <textarea class="md:col-span-2 border rounded-2xl p-3" name="bio" placeholder="توضیح کوتاه" required>{{ provider.bio|default:'' }}</textarea>
      
      <div>
        <label class="block mb-2 font-medium">شماره تماس</label>
        <input class="border rounded-2xl p-3 w-full" name="contact_phone" placeholder="09123456789" pattern="[0-9]{11}" maxlength="11" required value="{{ provider.contact_phone|default:'' }}">
      </div>
      
      <input class="border rounded-2xl p-3" name="instagram" placeholder="لینک اینستاگرام" value="{{ provider.instagram|default:'' }}">
      
      <textarea class="md:col-span-2 border rounded-2xl p-3" name="address" placeholder="آدرس" required>{{ provider.address|default:'' }}</textarea>
      
      <button class="md:col-span-2 bg-pink-600 text-white rounded-2xl py-3">ثبت اولیه و مشاهده پلن‌ها</button>
    </form>
  </div>
</div>
{% endblock %}
