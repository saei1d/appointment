{% extends 'base.html' %}{% block content %}<section class="p-4"><h1 class="brand text-4xl">ساعات کاری</h1><p class="text-sm text-stone-500">برای فعال شدن رزرو حداقل یک بازه کاری لازم است.</p><form method="post" class="mt-4 space-y-3">{% csrf_token %}{% for value,label in weekdays %}<div class="rounded-3xl bg-white p-4 shadow"><label class="flex items-center gap-2 font-bold"><input type="checkbox" name="active_{{ value }}"> {{ label }}</label><div class="mt-3 grid grid-cols-2 gap-2"><input type="time" name="start_{{ value }}" value="09:00" class="rounded-2xl border p-3"><input type="time" name="end_{{ value }}" value="18:00" class="rounded-2xl border p-3"></div></div>{% endfor %}<button class="w-full rounded-2xl bg-pink-500 py-4 text-white">ذخیره ساعات کاری</button></form></section>{% endblock %}
